name = "berstock-bot"
main = "src/index.js"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# KV Namespaces — sudah dibuat 28 Apr 2026
[[kv_namespaces]]
binding = "BOT_DATA"
id = "9ca47054eecf4b25b9714b1555b80d6b"

[[kv_namespaces]]
binding = "BOT_AUTH"
id = "59016f42dc314b02ba508cf5025cd09f"

[vars]
BOT_NAME = "Berstock"
BUSINESS_NAME_DEFAULT = "Toko Anda"
DEFAULT_TZ = "Asia/Jakarta"

# Secrets diset via: wrangler secret put <NAMA>
# - ANTHROPIC_API_KEY
# - TELEGRAM_BOT_TOKEN
# - TELEGRAM_WEBHOOK_SECRET
# - ADMIN_KEY  (untuk endpoint provisioning tenant baru)

[observability]
enabled = true
